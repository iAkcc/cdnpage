# Configuración de Netlify para el panel admin de plugins
[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

# SPA fallback: rutas del panel servidas por index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  conditions = { Path = ["!/api/*", "!/assets/*"] }

# Headers de seguridad globales
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "no-referrer"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    Content-Security-Policy = "default-src 'self'; img-src 'self' data: https://cdn.r2.dev; script-src 'self'; style-src 'self' 'unsafe-inline'; connect-src 'self' https://*.netlify.app; object-src 'none'; base-uri 'none'; frame-ancestors 'none'"

# Cache de assets estáticos
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
